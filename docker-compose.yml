version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: custom-web-app
    ports:
      - "8087:6000"
    environment:
      - PORT=6000
    restart: always

  # Example DB service if needed (as mentioned in the workshop)
  db:
      image: mongo:3.6.1
      container_name: db
      volumes:
          - mongodb:/data/db
          - mongodb_config:/data/configdb
      ports:
          - 27017:27017
      command: mongod

volumes:
  mongodb:
  mongodb_config:
